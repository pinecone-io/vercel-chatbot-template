allowBuilds:
  esbuild: true
  msw: true
  sharp: true
  unrs-resolver: true

# pnpm settings live here as of pnpm v10+ (the `pnpm` field in package.json is
# no longer read). Overrides pin patched versions of vulnerable transitive
# dependencies to remediate Dependabot critical/high alerts. Range selectors
# keep the override scoped to the vulnerable versions so newer majors pulled in
# by up-to-date parents (e.g. next 15's own minimatch/path-to-regexp) are left
# untouched.
overrides:
  form-data@<4.0.6: '^4.0.6'
  axios@<0.32.0: '^0.32.0'
  lodash@<4.18.1: '^4.18.1'
  qs@<6.2.4: '^6.15.3'
  nth-check@<2.0.1: '^2.1.1'
  css-what@<2.1.3: '^6.1.0'
  cross-spawn@<7.0.5: '^7.0.6'
  body-parser@<1.20.3: '^1.20.3'
  braces@<3.0.3: '^3.0.3'
  minimatch@<3.1.4: '3.1.4'
  flatted@<3.4.2: '^3.4.2'
  vite@<6.4.3: '^6.4.3'
